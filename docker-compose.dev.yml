name: house-chatbot

services:
  house-chatbot:
    # The image copies a prebuilt dist/housebot (amd64 musl binary), so
    # start the stack with scripts/dev-up.sh instead of a bare
    # `docker compose up --build`.
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATA_DIR=/app/data
      - SANDBOX_IMAGE=house-chatbot-sandbox:latest
      - DOCKER_NETWORK=house-chatbot_default
      - SANDBOX_TIMEOUT=${SANDBOX_TIMEOUT:-300}
      - HOST_DATA_DIR=${HOST_DATA_DIR}
