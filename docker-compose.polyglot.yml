version: '3.9'

# Polyglot microservices architecture for housebot.
#
# Service map:
#   discord-gateway  (Go)     — Discord events, routing, slash commands
#   agent            (Haskell) — Agent loop, tool dispatch, session management
#   llm-client       (Rust)   — OpenAI-compatible streaming/once completions
#   storage          (Ruby)   — Memory, notes, skills, history persistence
#   reminders        (PHP)    — Reminder scheduling and delivery
#   github-issues    (C++)    — GitHub App JWT auth + issue creation
#   mcp-proxy        (C)      — stdio MCP server bridge over HTTP

x-data: &data-volume
  type: bind
  source: ${DATA_DIR:-./data}
  target: /data

services:

  # ── Ruby: all persistence (memory, notes, skills, history) ─────────────────
  storage:
    build: ./services/storage
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - *data-volume
    environment:
      DATA_DIR: /data
    healthcheck:
      test: ["CMD", "ruby", "-e", "require 'net/http'; Net::HTTP.get(URI('http://localhost:3001/health')) rescue exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Rust: LLM streaming / once completions ──────────────────────────────────
  llm-client:
    build: ./services/llm-client
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      LLM_BASE_URL: ${LLM_BASE_URL:-http://server-slop:8080/v1}
      LLM_API_KEY:  ${LLM_API_KEY:-not-required}
      RUST_LOG:     info
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Haskell: agent loop, session management, tool dispatch ─────────────────
  agent:
    build: ./services/agent
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      LLM_CLIENT_URL:     http://llm-client:3002
      LLM_MODEL:          ${LLM_MODEL:-gemma-4-12b-qat-q4kxl}
      STORAGE_URL:        http://storage:3001
      MAX_CONTEXT_TOKENS: ${MAX_CONTEXT_TOKENS:-10000}
      PORT:               3003
    depends_on:
      storage:
        condition: service_healthy
      llm-client:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3003/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── PHP: reminder scheduling and delivery ───────────────────────────────────
  reminders:
    build: ./services/reminders
    restart: unless-stopped
    ports:
      - "3004:3004"
    volumes:
      - *data-volume
    environment:
      DATA_DIR: /data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3004/reminders || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── C++: GitHub App JWT auth + issue creation ───────────────────────────────
  github-issues:
    build: ./services/github-issues
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      GITHUB_APP_ID:           ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY:  ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_INSTALLATION_ID:  ${GITHUB_INSTALLATION_ID:-}
      GITHUB_REPO:             ${GITHUB_REPO:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── C: stdio MCP server HTTP proxy ─────────────────────────────────────────
  mcp-proxy:
    build: ./services/mcp-proxy
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      MCP_SERVERS: ${MCP_SERVERS:-ddg:duckduckgo-mcp-server}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3006/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Go: Discord gateway ─────────────────────────────────────────────────────
  discord-gateway:
    build: ./services/discord-gateway
    restart: unless-stopped
    environment:
      DISCORD_BOT_TOKEN:        ${DISCORD_BOT_TOKEN}
      AGENT_URL:                http://agent:3003
      STORAGE_URL:              http://storage:3001
      REMINDERS_URL:            http://reminders:3004
      CONVERSATION_IDLE_TIMEOUT: ${CONVERSATION_IDLE_TIMEOUT:-300}
    depends_on:
      agent:
        condition: service_healthy
      storage:
        condition: service_healthy
      reminders:
        condition: service_healthy

networks:
  default:
    name: housebot-polyglot
