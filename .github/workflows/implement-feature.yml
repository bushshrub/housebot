name: Implement Feature
run-name: "Implement issue ${{ github.event.inputs.issue_number || github.event.issue.number }}"

# Triggered by:
#   - The Discord bot labelling an issue agent:queued (primary dispatch path)
#   - An owner comment containing /implement on a plain issue
#   - Manual workflow_dispatch for testing
on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to implement
        required: true
        type: number
      model:
        description: Model name for opencode
        required: false
        default: opencode/deepseek-v4-flash-free
      model_config:
        description: Extra config fields (JSON object merged into opencode.json)
        required: false
        type: string

# Never cancel an in-progress implementation run; queue the new trigger instead.
concurrency:
  group: implement-feature-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

# Minimal default — jobs declare only what they need.
permissions:
  pull-requests: write

jobs:
  check-permission:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'agent:queued') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request == null &&
       (github.event.comment.body == '/implement' ||
        startsWith(github.event.comment.body, '/implement ') ||
        startsWith(github.event.comment.body, '/implement\n') ||
        contains(github.event.comment.body, ' /implement ') ||
        contains(github.event.comment.body, ' /implement\n') ||
        endsWith(github.event.comment.body, ' /implement') ||
        contains(github.event.comment.body, '\n/implement ') ||
        contains(github.event.comment.body, '\n/implement\n') ||
        endsWith(github.event.comment.body, '\n/implement')))
    permissions:
      issues: write
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
      issue_number: ${{ steps.resolve.outputs.issue_number }}
    steps:
      - name: Check permission
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "issues" ]; then
            # Allow any GitHub App bot, or a specific bot actor if configured.
            SENDER_TYPE="${{ github.event.sender.type }}"
            BOT_ACTOR="${{ vars.BOT_ACTOR }}"
            if [ "$SENDER_TYPE" = "Bot" ] || { [ -n "$BOT_ACTOR" ] && [ "${{ github.actor }}" = "$BOT_ACTOR" ]; }; then
              echo "allowed=true" >> "$GITHUB_OUTPUT"
            else
              echo "allowed=false" >> "$GITHUB_OUTPUT"
            fi
          elif [ "${{ github.event.comment.author_association }}" = "OWNER" ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reject non-owner comment
        if: steps.check.outputs.allowed == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ Only the repository owner can trigger `/implement`.',
            });

      - name: Resolve issue number
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "issue_number=${{ github.event.inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

  implement:
    needs: check-permission
    if: needs.check-permission.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Configure git identity
        run: |
          git config user.name "opencode"
          git config user.email "noreply@opencode.ai"

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install opencode
        run: npm install -g opencode-ai@1.18.2

      - name: Mark running
        if: github.event_name == 'issues'
        uses: actions/github-script@v8
        with:
          script: |
            const issue = parseInt('${{ needs.check-permission.outputs.issue_number }}');
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue, name: 'agent:queued',
              });
            } catch (e) {
              if (e.status !== 404) throw e;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue,
              body: '🤖 **Agent started.** Running opencode.',
            });

      - name: Fetch issue and write config
        uses: actions/github-script@v8
        with:
          script: |
            const issueNumber = ${{ needs.check-permission.outputs.issue_number }};
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            const fs = require('fs');

            // Model priority: dispatch input → repo var → housebot metadata in issue body → default
            let model = process.env.DISPATCH_MODEL || process.env.REPO_MODEL;
            if (!model) {
              const match = (issue.body || '').match(/<!--\s*housebot-development-job\s*([\s\S]*?)\s*-->/);
              if (match) {
                try { model = JSON.parse(match[1]).model; } catch {}
              }
            }
            model = model || 'opencode/deepseek-v4-flash-free';

            let extra = {};
            const dispatchExtra = process.env.DISPATCH_EXTRA || '';
            if (dispatchExtra) { try { extra = JSON.parse(dispatchExtra); } catch {} }

            // Spread extra first so it cannot overwrite the resolved model.
            const config = { ...extra, model };
            fs.writeFileSync('opencode.json', JSON.stringify(config, null, 2));
            console.log('Config:', JSON.stringify(config));

            // For comment triggers, extract the text after the /implement token.
            // For Discord-dispatched issues, use the full structured issue body.
            const trigger = process.env.COMMENT_BODY || '';
            const tokenMatch = trigger.match(/(?:^|\s)\/implement(?=\s|$)([\s\S]*)/);
            const commentText = tokenMatch ? tokenMatch[1].trim() : '';

            const prompt = commentText || [
              `Implement the feature described in GitHub issue #${issueNumber}.`,
              '',
              `Issue title: ${issue.title}`,
              '',
              'Issue body:',
              issue.body || '(no body)',
              '',
              'Make all necessary code changes. Follow the existing code style',
              'and conventions in the repository. Commit your changes.',
            ].join('\n');

            fs.writeFileSync('${{ runner.temp }}/opencode_prompt.txt', prompt);
            console.log('Prompt written.');
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          DISPATCH_MODEL: ${{ github.event.inputs.model }}
          DISPATCH_EXTRA: ${{ github.event.inputs.model_config }}
          REPO_MODEL: ${{ vars.OPENCODE_MODEL }}

      - name: Run opencode
        run: |
          python3 -c "
          import subprocess, sys
          with open('${{ runner.temp }}/opencode_prompt.txt') as f:
              prompt = f.read()
          subprocess.run(['opencode', 'run', '--variant', 'high', prompt], check=True)
          "
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Clean up config
        run: rm -f opencode.json

      - name: Create Pull Request
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: |
            feat: implement #${{ needs.check-permission.outputs.issue_number }}
          title: |
            Implement #${{ needs.check-permission.outputs.issue_number }}
          body: |
            Closes #${{ needs.check-permission.outputs.issue_number }}

            Auto-implemented by **OpenCode**.

            | | |
            |---|---|
            | Triggered by | @${{ github.event.comment.user.login || github.actor }} |
            | Issue | #${{ needs.check-permission.outputs.issue_number }} |
          branch: opencode/issue-${{ needs.check-permission.outputs.issue_number }}
          base: master
          delete-branch: true

      - name: Write outcome
        if: always()
        run: |
          echo "${{ steps.pr.outputs.pull-request-operation }}" > "${{ runner.temp }}/pr_operation.txt"

      - name: Upload outcome
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-outcome
          path: ${{ runner.temp }}/pr_operation.txt
          retention-days: 1
