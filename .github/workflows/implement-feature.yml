name: Implement feature issue

on:
  issue_comment:
    types: [created]

jobs:
  check-permission:
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/implement')
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Check commenter is repo owner
        id: check
        run: |
          if [ "${{ github.event.comment.author_association }}" = "OWNER" ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reject non-owner
        if: steps.check.outputs.allowed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ Only the repository owner can trigger `/implement`.',
            });

  implement:
    needs: check-permission
    if: needs.check-permission.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude Code on issue
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Implement the feature described in GitHub issue #${{ github.event.issue.number }}.

            Issue title: ${{ github.event.issue.title }}

            Issue body:
            ${{ github.event.issue.body }}

            Make all necessary code changes to implement this feature. Follow the existing
            code style and conventions in the repository. When done, open a pull request
            with a clear description of what was changed.
          allowed_tools: "Bash,Read,Write,Edit"
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
