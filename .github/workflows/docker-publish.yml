name: Post-merge Docker publish

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all

  build:
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: main
            context: .
            image-suffix: ""
            platform: linux/amd64
            architecture: amd64
            runner: ubuntu-24.04
          - name: sandbox
            context: ./sandbox
            image-suffix: /sandbox
            platform: linux/amd64
            architecture: amd64
            runner: ubuntu-24.04

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image-suffix }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ matrix.context }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image-suffix }}:sha-${{ github.sha }}-${{ matrix.architecture }}
            ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image-suffix }}:latest-${{ matrix.architecture }}
          labels: ${{ steps.meta.outputs.labels }}
          # Read the old shared cache during migration, then write an isolated
          # cache per architecture so parallel jobs never overwrite each other.
          cache-from: |
            type=gha,scope=${{ matrix.name }}-${{ matrix.architecture }}
            type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-${{ matrix.architecture }}

  # Assemble the architecture-specific images into the tags consumed by the
  # deployment bot. Without this manifest, a pull of sha-${{ github.sha }} (or
  # latest) fails with "manifest unknown".
  publish-manifests:
    needs: build
    permissions:
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish multi-architecture manifests
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:sha-$SHA" \
            "$IMAGE:sha-$SHA-amd64"
          docker buildx imagetools create \
            --tag "$IMAGE:latest" \
            "$IMAGE:latest-amd64"
          docker buildx imagetools create \
            --tag "$IMAGE/sandbox:sha-$SHA" \
            "$IMAGE/sandbox:sha-$SHA-amd64"
          docker buildx imagetools create \
            --tag "$IMAGE/sandbox:latest" \
            "$IMAGE/sandbox:latest-amd64"

  manifest:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: main
            image-suffix: ""
          - name: sandbox
            image-suffix: /sandbox

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish multi-platform manifest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image-suffix }}
          SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: |
          manifest_tags=(
            --tag "${IMAGE}:latest"
            --tag "${IMAGE}:sha-${SHA}"
          )
          if [[ -n "${RELEASE_TAG}" ]]; then
            manifest_tags+=(--tag "${IMAGE}:${RELEASE_TAG}")
          fi

          docker buildx imagetools create \
            "${manifest_tags[@]}" \
            "${IMAGE}:sha-${SHA}-amd64"

  # Notify the deployment channel for every push, even when the build or
  # publish jobs fail. The push payload contains the complete commit batch.
  notify-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Notify pushed commits
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOYMENT_WEBHOOK }}
          COMMITS: ${{ toJSON(github.event.commits) }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
          REF: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          total=$(jq 'length' <<< "$COMMITS")
          chunks=$(jq -c '
            [ .[] |
              "[`" + (.id[0:7]) + "`](" + .url + ") " +
              (.message | split("\n")[0])
            ] |
            reduce .[] as $line ([[]];
              if ((.[-1] | join("\n") | length) + ($line | length) + 1 > 3800)
              then . + [[$line]]
              else .[:-1] + [(.[-1] + [$line])]
              end
            ) | .[]
          ' <<< "$COMMITS")
          chunk_total=$(wc -l <<< "$chunks" | tr -d ' ')
          number=0
          while IFS= read -r chunk; do
            number=$((number + 1))
            description=$(jq -r 'join("\n")' <<< "$chunk")
            jq -n \
              --arg ref "$REF" \
              --arg before "$BEFORE" \
              --arg after "$AFTER" \
              --arg repository "$REPOSITORY" \
              --arg description "$description" \
              --arg total "$total" \
              --arg batch "$number/$chunk_total" \
              '{embeds:[{title:("Push to "+$repository+"/"+$ref),description:$description,color:3447003,fields:[{name:"Commits",value:($total+" commit(s), notification "+$batch)},{name:"Range",value:("`"+$before+"` → `"+$after+"`")}]}]}' \
              | curl --fail --silent --show-error -X POST "$WEBHOOK" \
                  -H "Content-Type: application/json" --data-binary @-
          done <<< "$chunks"

  notify-deployment-bot:
    needs: manifest
    runs-on: ubuntu-latest
    steps:
      - name: Notify deployment channel
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOYMENT_WEBHOOK }}
          SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Manual workflow dispatch' }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          jq -n \
            --arg sha "$SHA" \
            --arg message "$COMMIT_MESSAGE" \
            --arg url "$SERVER_URL/$REPOSITORY/commit/$SHA" \
            '{embeds:[{title:"Build succeeded",color:3066993,fields:[{name:"Commit",value:("`"+$sha+"`")},{name:"Message",value:$message},{name:"Source",value:("[View commit]("+$url+")")}]}]}' \
            | curl --fail --silent --show-error -X POST "$WEBHOOK" -H "Content-Type: application/json" --data-binary @-
