name: Post-merge Docker publish

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      issues: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - name: Run tests (including GitHub API integration)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: cargo test --all

  build:
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: main
            context: .
            image-suffix: ""
          - name: sandbox
            context: ./crates/sandbox/docker
            image-suffix: /sandbox

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (musl)
        if: matrix.name == 'main'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        if: matrix.name == 'main'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo artifacts
        if: matrix.name == 'main'
        uses: Swatinem/rust-cache@v2
        with:
          key: musl-release

      - name: Build bot binary (musl)
        if: matrix.name == 'main'
        env:
          HOUSEBOT_GIT_SHA: ${{ github.sha }}
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: |
          cargo build --release --locked --target x86_64-unknown-linux-musl --package housebot
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/housebot dist/housebot
          strip dist/housebot

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image-suffix }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.name }}-amd64
            type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  # Notify the deployment channel for every push, even when the build fails.
  notify-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Notify pushed commits
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOYMENT_WEBHOOK }}
          COMMITS: ${{ toJSON(github.event.commits) }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
          REF: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          total=$(jq 'length' <<< "$COMMITS")
          chunks=$(jq -c '
            [ .[] |
              "[`" + (.id[0:7]) + "`](" + .url + ") " +
              (.message | split("\n")[0])
            ] |
            reduce .[] as $line ([[]];
              if ((.[-1] | join("\n") | length) + ($line | length) + 1 > 3800)
              then . + [[$line]]
              else .[:-1] + [(.[-1] + [$line])]
              end
            ) | .[]
          ' <<< "$COMMITS")
          chunk_total=$(wc -l <<< "$chunks" | tr -d ' ')
          number=0
          while IFS= read -r chunk; do
            number=$((number + 1))
            description=$(jq -r 'join("\n")' <<< "$chunk")
            jq -n \
              --arg ref "$REF" \
              --arg before "$BEFORE" \
              --arg after "$AFTER" \
              --arg repository "$REPOSITORY" \
              --arg description "$description" \
              --arg total "$total" \
              --arg batch "$number/$chunk_total" \
              '{embeds:[{title:("Push to "+$repository+"/"+$ref),description:$description,color:3447003,fields:[{name:"Commits",value:($total+" commit(s), notification "+$batch)},{name:"Range",value:("`"+$before+"` → `"+$after+"`")}]}]}' \
              | curl --fail --silent --show-error -X POST "$WEBHOOK" \
                  -H "Content-Type: application/json" --data-binary @-
          done <<< "$chunks"

  notify-deployment-bot:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Notify deployment channel
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOYMENT_WEBHOOK }}
          SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Manual workflow dispatch' }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          jq -n \
            --arg sha "$SHA" \
            --arg message "$COMMIT_MESSAGE" \
            --arg url "$SERVER_URL/$REPOSITORY/commit/$SHA" \
            '{embeds:[{title:"Build succeeded",color:3066993,fields:[{name:"Commit",value:("`"+$sha+"`")},{name:"Message",value:($message | .[0:1000] + (if length > 1000 then "…" else "" end))},{name:"Source",value:("[View commit]("+$url+")")}]}]}' \
            | curl --fail --silent --show-error -X POST "$WEBHOOK" -H "Content-Type: application/json" --data-binary @-
