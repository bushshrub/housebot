name: Post-merge Docker publish

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: main
            context: .
            image-suffix: ""
            platform: linux/amd64
            architecture: amd64
            runner: ubuntu-24.04
          - name: sandbox
            context: ./sandbox
            image-suffix: /sandbox
            platform: linux/amd64
            architecture: amd64
            runner: ubuntu-24.04
          - name: main
            context: .
            image-suffix: ""
            platform: linux/arm64
            architecture: arm64
            runner: ubuntu-24.04-arm
          - name: sandbox
            context: ./sandbox
            image-suffix: /sandbox
            platform: linux/arm64
            architecture: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image-suffix }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ matrix.context }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image-suffix }}:sha-${{ github.sha }}-${{ matrix.architecture }}
          labels: ${{ steps.meta.outputs.labels }}
          # Read the old shared cache during migration, then write an isolated
          # cache per architecture so parallel jobs never overwrite each other.
          cache-from: |
            type=gha,scope=${{ matrix.name }}-${{ matrix.architecture }}
            type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-${{ matrix.architecture }}

  manifest:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: main
            image-suffix: ""
          - name: sandbox
            image-suffix: /sandbox

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish multi-platform manifest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image-suffix }}
          SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: |
          manifest_tags=(
            --tag "${IMAGE}:latest"
            --tag "${IMAGE}:sha-${SHA}"
          )
          if [[ -n "${RELEASE_TAG}" ]]; then
            manifest_tags+=(--tag "${IMAGE}:${RELEASE_TAG}")
          fi

          docker buildx imagetools create \
            "${manifest_tags[@]}" \
            "${IMAGE}:sha-${SHA}-amd64" \
            "${IMAGE}:sha-${SHA}-arm64"
