name: Build and publish Docker images

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_MAIN: ${{ github.repository }}
  IMAGE_SANDBOX: ${{ github.repository }}/sandbox

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}

      - name: Extract sandbox metadata
        id: sandbox-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/sandbox

      - name: Build and push main image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          driver: docker-container
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}:sha-${{ github.sha }}
            ${{ github.ref_type == 'tag' && format('{0}/{1}:{2}', env.REGISTRY, github.repository, github.ref_name) || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push sandbox image
        uses: docker/build-push-action@v6
        with:
          context: ./sandbox
          push: true
          driver: docker-container
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/sandbox:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/sandbox:sha-${{ github.sha }}
            ${{ github.ref_type == 'tag' && format('{0}/{1}/sandbox:{2}', env.REGISTRY, github.repository, github.ref_name) || '' }}
          labels: ${{ steps.sandbox-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
