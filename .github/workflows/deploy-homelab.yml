name: Deploy to HomeLab

# Triggered automatically after a successful image publish, or manually.
#
# Required GitHub secrets (set on the 'homelab' environment or the repo):
#   HOMELAB_HOST         — IP or hostname of the homelab server
#   HOMELAB_USER         — SSH username
#   HOMELAB_SSH_KEY      — RSA/Ed25519 private key (the full PEM text)
#   HOMELAB_DEPLOY_PATH  — Absolute path on the server where docker-compose.yml lives
#
# Optional secrets:
#   HOMELAB_SSH_PORT         — SSH port (default: 22)
#   DISCORD_DEPLOY_WEBHOOK   — Discord webhook URL for deployment notifications

on:
  workflow_run:
    workflows: ["Build and publish Docker images"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force:
        description: "Deploy even if the upstream publish workflow did not succeed"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

# Never run two deployments at the same time; queue instead of cancelling.
concurrency:
  group: homelab-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  gate:
    name: Deployment gate
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - name: Evaluate gate
        id: gate
        run: |
          FORCE="${{ inputs.force || 'false' }}"
          EVENT="${{ github.event_name }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"

          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch (force=$FORCE) — proceeding"
          elif [[ "$CONCLUSION" == "success" ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Upstream publish succeeded — proceeding"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Upstream conclusion='$CONCLUSION' — skipping deployment"
          fi

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    environment: homelab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOMELAB_HOST }}
          username: ${{ secrets.HOMELAB_USER }}
          key: ${{ secrets.HOMELAB_SSH_KEY }}
          port: ${{ secrets.HOMELAB_SSH_PORT || '22' }}
          command_timeout: 10m
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.HOMELAB_DEPLOY_PATH }}"

            echo "=== [1/5] Saving rollback checkpoint ==="
            docker inspect \
                --format='{{index .RepoDigests 0}}' \
                ghcr.io/bushshrub/housebot:latest \
                2>/dev/null > .prev_image_digest \
                || printf 'none' > .prev_image_digest
            printf 'Previous image: %s\n' "$(cat .prev_image_digest)"

            echo "=== [2/5] Pulling new images ==="
            docker compose pull

            echo "=== [3/5] Starting containers ==="
            docker compose up -d --remove-orphans

            echo "=== [4/5] Waiting 15s for startup ==="
            sleep 15

            echo "=== [5/5] Verifying containers ==="
            if ! docker compose ps | grep -q "Up"; then
                echo "ERROR: No containers running after deployment" >&2
                docker compose logs --tail=100 >&2
                exit 1
            fi

            docker compose ps
            echo "=== Deploy step complete ==="

      - name: Crash-loop probe
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOMELAB_HOST }}
          username: ${{ secrets.HOMELAB_USER }}
          key: ${{ secrets.HOMELAB_SSH_KEY }}
          port: ${{ secrets.HOMELAB_SSH_PORT || '22' }}
          command_timeout: 3m
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.HOMELAB_DEPLOY_PATH }}"

            echo "Waiting 30s to detect crash loops..."
            sleep 30

            STATUS=$(docker compose ps --format '{{.Status}}' 2>/dev/null | head -1 || echo "unknown")
            printf 'Container status: %s\n' "$STATUS"

            if printf '%s' "$STATUS" | grep -qiE 'restarting|exited|dead|error'; then
                printf 'ERROR: Unhealthy state detected: %s\n' "$STATUS" >&2
                docker compose logs --tail=100 >&2
                exit 1
            fi

            CONTAINER=$(docker compose ps --format '{{.Name}}' 2>/dev/null | head -1 || true)
            if [ -n "$CONTAINER" ]; then
                RESTARTS=$(docker inspect --format='{{.RestartCount}}' "$CONTAINER" 2>/dev/null || echo "0")
                printf 'Restart count: %s\n' "$RESTARTS"
                if [ "$RESTARTS" -gt 2 ]; then
                    printf 'ERROR: Container restarted %s times — crash loop\n' "$RESTARTS" >&2
                    docker compose logs --tail=100 >&2
                    exit 1
                fi
            fi

            echo "=== Health probe passed ==="

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOMELAB_HOST }}
          username: ${{ secrets.HOMELAB_USER }}
          key: ${{ secrets.HOMELAB_SSH_KEY }}
          port: ${{ secrets.HOMELAB_SSH_PORT || '22' }}
          command_timeout: 5m
          # Don't stop on error here — we want best-effort rollback output
          script: |
            set -euo pipefail
            cd "${{ secrets.HOMELAB_DEPLOY_PATH }}"
            echo "=== ROLLBACK INITIATED ==="

            PREV=$(cat .prev_image_digest 2>/dev/null || echo "none")
            if [ "$PREV" = "none" ] || [ -z "$PREV" ]; then
                echo "No previous image checkpoint — cannot auto-rollback"
                exit 0
            fi

            printf 'Rolling back to: %s\n' "$PREV"
            docker pull "$PREV"
            docker tag "$PREV" ghcr.io/bushshrub/housebot:latest
            docker compose up -d --remove-orphans
            sleep 10
            docker compose ps
            echo "=== Rollback complete ==="

      - name: Notify Discord on success
        if: success()
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          [ -z "$WEBHOOK" ] && exit 0
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -f -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"HomeLab deployment succeeded\",
                \"color\": 3066993,
                \"fields\": [
                  {\"name\": \"Commit\", \"value\": \"\`${SHORT_SHA}\`\", \"inline\": true},
                  {\"name\": \"Actor\",  \"value\": \"${{ github.actor }}\", \"inline\": true},
                  {\"name\": \"Run\",    \"value\": \"[View logs](${RUN_URL})\", \"inline\": false}
                ]
              }]
            }"

      - name: Notify Discord on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          [ -z "$WEBHOOK" ] && exit 0
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -f -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"HomeLab deployment FAILED\",
                \"color\": 15158332,
                \"description\": \"Automatic rollback was attempted.\",
                \"fields\": [
                  {\"name\": \"Commit\", \"value\": \"\`${SHORT_SHA}\`\", \"inline\": true},
                  {\"name\": \"Run\",    \"value\": \"[View logs](${RUN_URL})\", \"inline\": false}
                ]
              }]
            }"
