name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  opencode:
    if: |
      github.event_name == 'pull_request' ||
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        with:
          model: nvidia/google/gemma-4-31b-it
          prompt: ${{ github.event_name == 'pull_request' && 'Review this pull request for potential bugs, regressions, security issues, incorrect assumptions, and missing tests. Inspect the relevant repository code and the pull request diff. Report only actionable findings as review comments. Do not modify files, commit changes, or open a pull request.' || '' }}
