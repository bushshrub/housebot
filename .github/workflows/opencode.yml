name: opencode

# Standard opencode workflow per https://opencode.ai/docs/github/.
# Triggered by a comment containing /oc or /opencode on an issue or PR —
# including comments posted by the Housebot GitHub App when dispatching a
# development job. The opencode-agent GitHub App (github.com/apps/opencode-agent)
# must be installed on this repository; it creates branches and pull requests
# itself, so this workflow needs no contents/pull-requests permissions and is
# unaffected by the "Actions cannot create pull requests" repository setting.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    # Anchored to the start of the comment so unrelated text that merely
    # contains '/oc' (e.g. a CodeRabbit summary) cannot fire the workflow,
    # and gated to trusted humans or GitHub App bots (the Housebot dispatch
    # path). opencode additionally asserts the actor's write permission
    # server-side before acting.
    if: |
      (
        github.event.comment.body == '/oc' ||
        github.event.comment.body == '/opencode' ||
        startsWith(github.event.comment.body, '/oc ') ||
        startsWith(github.event.comment.body, '/opencode ')
      ) && (
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) ||
        github.event.comment.user.type == 'Bot'
      )
    concurrency:
      group: opencode-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Auto-approve permissions
        shell: bash
        run: |
          cat > opencode.json << 'EOF'
          {
            "permission": "allow"
          }
          EOF

      - name: Run opencode
        # Pinned to github-v1.2.19 — update after reviewing the release diff.
        uses: anomalyco/opencode/github@77fc88c8ade8e5a620ebbe1197f3a572d29ae91a
        with:
          model: opencode/deepseek-v4-flash-free
          variant: high
