name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, reopened]

# Cancel any in-progress run for the same PR/issue when a new one starts.
concurrency:
  group: opencode-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Gate for comment-triggered runs: only proceed if the commenter has at
  # least one merged PR in this repo.  Keeps write-capable runs restricted
  # to trusted contributors.
  check-comment-trusted:
    if: |
      github.actor != 'github-actions[bot]' &&
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      (contains(github.event.comment.body, ' /oc') ||
       startsWith(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, ' /opencode') ||
       startsWith(github.event.comment.body, '/opencode'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      trusted: ${{ steps.check.outputs.trusted }}
    steps:
      - name: Check if commenter is trusted
        id: check
        uses: actions/github-script@v8
        with:
          script: |
            const actor = context.actor;
            const { data: result } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:pr is:merged author:${actor}`,
              per_page: 1,
            });
            const trusted = result.total_count > 0;
            core.info(`Commenter ${actor} trusted: ${trusted} (${result.total_count} merged PRs)`);
            core.setOutput('trusted', trusted ? 'true' : 'false');

  opencode-comment:
    needs: check-comment-trusted
    if: needs.check-comment-trusted.outputs.trusted == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        with:
          model: opencode/deepseek-v4-flash-free
          use_github_token: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-trusted:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      trusted: ${{ steps.check.outputs.trusted }}
    steps:
      - name: Check if contributor is trusted
        id: check
        uses: actions/github-script@v8
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const { data: result } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:pr is:merged author:${author}`,
              per_page: 1,
            });
            const trusted = result.total_count > 0;
            core.info(`Author ${author} trusted: ${trusted} (${result.total_count} merged PRs)`);
            core.setOutput('trusted', trusted ? 'true' : 'false');

  opencode-pr:
    needs: check-trusted
    if: needs.check-trusted.outputs.trusted == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        with:
          model: opencode/deepseek-v4-flash-free
          use_github_token: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
