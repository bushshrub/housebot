name: Agent Label Sync

# Manages issue labels for the Implement Feature workflow without adding
# labels from within that workflow (which would cause re-trigger loops).
on:
  workflow_run:
    workflows: ["Implement Feature"]
    types: [completed]

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read
    steps:
      - name: Resolve run metadata
        id: meta
        uses: actions/github-script@v8
        with:
          script: |
            const run = context.payload.workflow_run;

            // Parse issue number from run-name: "Implement issue NNN"
            const title = run.display_title || '';
            const match = title.match(/Implement issue (\d+)/);
            if (!match) {
              core.info('No issue number in run display title; skipping.');
              core.setOutput('skip', 'true');
              return;
            }

            // Only act when the implement job actually ran (not skipped due to permission check).
            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
            });
            const implementJob = jobs.find(j => j.name === 'implement');
            if (!implementJob || implementJob.conclusion === 'skipped') {
              core.info('implement job was skipped; no label change.');
              core.setOutput('skip', 'true');
              return;
            }

            core.setOutput('skip', 'false');
            core.setOutput('issue_number', match[1]);
            core.setOutput('run_id', String(run.id));
            core.setOutput('conclusion', run.conclusion || '');
            core.setOutput('html_url', run.html_url || '');

      - name: Download outcome artifact
        if: steps.meta.outputs.skip == 'false' && steps.meta.outputs.conclusion == 'success'
        uses: actions/download-artifact@v4
        with:
          name: agent-outcome
          run-id: ${{ steps.meta.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: /tmp/agent-outcome
        continue-on-error: true

      - name: Sync labels and post comment
        if: steps.meta.outputs.skip == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            const issue = parseInt('${{ steps.meta.outputs.issue_number }}', 10);
            const conclusion = '${{ steps.meta.outputs.conclusion }}';
            const htmlUrl = '${{ steps.meta.outputs.html_url }}';

            let addLabel;
            let comment;

            if (conclusion === 'failure') {
              addLabel = 'agent:failed';
              comment = `❌ **Agent run failed.** See [workflow logs](${htmlUrl}) for details.`;
            } else {
              let prOperation = '';
              try {
                const fs = require('fs');
                prOperation = fs.readFileSync('/tmp/agent-outcome/pr_operation.txt', 'utf8').trim();
              } catch (_) {}

              if (prOperation === 'none') {
                addLabel = 'agent:no-changes';
                comment = '🤖 Agent finished but produced no changes.';
              } else {
                addLabel = 'agent:completed';
              }
            }

            const STALE = ['agent:queued', 'agent:running', 'agent:failed', 'agent:completed', 'agent:no-changes'];
            for (const label of STALE) {
              if (label === addLabel) continue;
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue, name: label,
                });
              } catch (e) {
                if (e.status !== 404) throw e;
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue, labels: [addLabel],
            });

            if (comment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue, body: comment,
              });
            }
