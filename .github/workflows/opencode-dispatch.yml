name: opencode-dispatch

# Triggered via workflow_dispatch by the Housebot GitHub App when an owner
# approves a development job.  The standard opencode.yml (comment-based) is
# left unchanged for manual /oc usage.
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue or PR number to work on
        required: true
        type: number
      prompt:
        description: The prompt/instruction for OpenCode
        required: true
        type: string
      requester_id:
        description: Discord user ID to notify when the run finishes
        required: true
        type: string

concurrency:
  group: opencode-dispatch-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Verify dispatch source
        if: ${{ !endsWith(github.actor, '[bot]') }}
        run: |
          echo "::error::This workflow can only be triggered by the authorized Housebot GitHub App installation. Direct dispatch by users is not permitted — the OWNER_DISCORD_ID authorization is enforced in the Rust dispatch flow."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run opencode
        id: run_agent
        uses: anomalyco/opencode/github@77fc88c8ade8e5a620ebbe1197f3a572d29ae91a
        with:
          model: opencode/deepseek-v4-flash-free
          variant: high
          issue_number: ${{ inputs.issue_number }}
          prompt: ${{ inputs.prompt }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
          OPENCODE_CONFIG_CONTENT: |
            {
              "$schema": "https://opencode.ai/config.json",
              "permission": "allow"
            }

      - name: Notify Discord of completion
        if: always() && steps.run_agent.outcome != 'skipped'
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOYMENT_WEBHOOK }}
          SIGNING_KEY: ${{ secrets.DEV_NOTIFY_SIGNING_KEY }}
          OUTCOME: ${{ steps.run_agent.outcome }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REQUESTER_ID: ${{ inputs.requester_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_DEPLOYMENT_WEBHOOK is not configured; skipping notification."
            exit 0
          fi
          if [ -z "$SIGNING_KEY" ]; then
            echo "DEV_NOTIFY_SIGNING_KEY is not configured; skipping notification."
            exit 0
          fi

          if [ "$OUTCOME" = "success" ]; then
            STATUS_LINE="✅ OpenCode finished issue #${ISSUE_NUMBER}."
          else
            STATUS_LINE="❌ OpenCode run for issue #${ISSUE_NUMBER} did not complete successfully (${OUTCOME})."
          fi
          # Signed so the bot can tell this footer really came from this
          # workflow and not from some other webhook posting in the same
          # channel — see housebot_coding_agent::dev_notify for the matching
          # verification and the exact canonical-message format.
          CANONICAL="requester_id=${REQUESTER_ID} issue=${ISSUE_NUMBER} status=${OUTCOME}"
          SIG=$(printf '%s' "$CANONICAL" | openssl dgst -sha256 -hmac "$SIGNING_KEY" -hex | awk '{print $NF}')
          FOOTER="housebot-dev-notify ${CANONICAL} sig=${SIG}"

          jq -n \
            --arg status "$STATUS_LINE" \
            --arg url "$RUN_URL" \
            --arg footer "$FOOTER" \
            '{
              embeds: [{
                title: "Feature development finished",
                url: $url,
                description: $status,
                color: 5814783,
                footer: {text: $footer}
              }]
            }' \
            | curl --fail --silent --show-error -X POST "$WEBHOOK" \
                -H "Content-Type: application/json" \
                --data-binary @-
