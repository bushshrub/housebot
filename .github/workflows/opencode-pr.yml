name: opencode (PR)

# Triggered by:
#   - A PR being opened/reopened (initial review)
#   - A comment or review containing /oc or /opencode (manual invoke, also used
#     to resolve review feedback)
#   - CI failing on a PR (automatic fix attempt)
on:
  pull_request:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: ["Pull request checks"]
    types: [completed]

concurrency:
  group: opencode-pr-${{ github.event.pull_request.number || github.event.issue.number || (github.event.workflow_run.pull_requests[0] && github.event.workflow_run.pull_requests[0].number) || github.run_id }}
  cancel-in-progress: true

jobs:
  # Initial review when a PR is opened/reopened.
  check-trusted:
    if: |
      github.event_name == 'pull_request' &&
      !endsWith(github.actor, '[bot]') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      trusted: ${{ steps.check.outputs.trusted }}
    steps:
      - name: Check if contributor is trusted
        id: check
        uses: actions/github-script@v8
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const { data: result } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:pr is:merged author:${author}`,
              per_page: 1,
            });
            const trusted = result.total_count > 0;
            core.info(`Author ${author} trusted: ${trusted} (${result.total_count} merged PRs)`);
            core.setOutput('trusted', trusted ? 'true' : 'false');

  review:
    needs: check-trusted
    if: needs.check-trusted.outputs.trusted == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure git identity
        run: |
          git config user.name "opencode"
          git config user.email "noreply@opencode.ai"

      - name: Run opencode
        # Pinned to github-v1.2.19 — update after reviewing the release diff.
        uses: anomalyco/opencode/github@77fc88c8ade8e5a620ebbe1197f3a572d29ae91a
        with:
          model: opencode/deepseek-v4-flash-free
          variant: high
          use_github_token: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Manual /oc or /opencode mention on a PR — comment, review comment, or review body.
  # Only trusted associations (owner, member, collaborator) can trigger a push.
  mention:
    if: |
      github.event_name == 'issue_comment' && github.event.issue.pull_request != null &&
      !endsWith(github.actor, '[bot]') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) ||
      github.event_name == 'pull_request_review_comment' &&
      !endsWith(github.actor, '[bot]') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) ||
      github.event_name == 'pull_request_review' &&
      !endsWith(github.actor, '[bot]') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Resolve PR head ref
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.comment?.body ?? context.payload.review?.body ?? '';
            // Standalone /oc or /opencode command, not e.g. "/octopus".
            if (!/(^|\s)\/(opencode|oc)(?=\s|$)/i.test(body)) {
              core.info('No standalone /oc or /opencode command found; skipping.');
              core.setOutput('skip', 'true');
              return;
            }

            const prNumber = context.payload.pull_request?.number || context.payload.issue?.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            if (pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              core.setFailed('Refusing to push to a fork PR.');
              return;
            }
            core.setOutput('ref', pr.head.ref);
            core.setOutput('number', String(pr.number));

      - name: Checkout PR branch
        if: steps.pr.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.ref }}
          persist-credentials: false

      - name: Configure git identity
        if: steps.pr.outputs.skip != 'true'
        run: |
          git config user.name "opencode"
          git config user.email "noreply@opencode.ai"

      - name: Run opencode
        if: steps.pr.outputs.skip != 'true'
        uses: anomalyco/opencode/github@77fc88c8ade8e5a620ebbe1197f3a572d29ae91a
        with:
          model: opencode/deepseek-v4-flash-free
          variant: high
          use_github_token: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # CI failed on a PR — attempt an automatic fix and push it to the PR branch.
  ci-autofix:
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Resolve PR head ref
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.workflow_run.pull_requests[0].number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            if (pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              core.setFailed('Refusing to push to a fork PR.');
              return;
            }
            if (!['OWNER', 'MEMBER', 'COLLABORATOR'].includes(pr.author_association)) {
              core.setFailed(`Refusing to autofix CI for untrusted PR author (${pr.author_association}).`);
              return;
            }
            if (context.payload.workflow_run.head_sha !== pr.head.sha) {
              core.info('Skipping — this run is for a stale commit; the PR has since moved on.');
              core.setOutput('skip', 'true');
              return;
            }
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 10,
            });
            const alreadyAutofixed = commits.slice(-3).some(c =>
              c.commit.author?.email === 'noreply@opencode.ai' ||
              c.commit.author?.name === 'opencode' ||
              c.commit.message.startsWith('opencode:')
            );
            if (alreadyAutofixed) {
              core.info('Skipping — a prior ci-autofix commit is already on this branch; avoiding an autofix loop.');
              core.setOutput('skip', 'true');
              return;
            }
            core.setOutput('ref', pr.head.ref);
            core.setOutput('number', String(pr.number));
            core.setOutput('run_url', context.payload.workflow_run.html_url);

      - name: Checkout PR branch
        if: steps.pr.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.ref }}
          persist-credentials: false

      - name: Configure git identity
        if: steps.pr.outputs.skip != 'true'
        run: |
          git config user.name "opencode"
          git config user.email "noreply@opencode.ai"

      - name: Run opencode
        if: steps.pr.outputs.skip != 'true'
        uses: anomalyco/opencode/github@77fc88c8ade8e5a620ebbe1197f3a572d29ae91a
        with:
          model: opencode/deepseek-v4-flash-free
          variant: high
          use_github_token: "true"
          prompt: |
            The "Pull request checks" CI workflow failed on this PR's branch:
            ${{ steps.pr.outputs.run_url }}

            Reproduce the failure locally (cargo fmt --check, cargo clippy
            --all-targets -- -D warnings, cargo test --all) and fix whatever is
            causing it. Keep the fix minimal and scoped to what's needed to make
            CI pass — do not refactor unrelated code. Commit the fix.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
