name: Check Agent Runner Health

# Daily check that the self-hosted runner and all three agent CLIs are healthy.
# Failures surface in the Actions tab and can be watched via branch protection
# or status checks.

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC daily
  workflow_dispatch:

jobs:
  health-check:
    runs-on: [self-hosted, housebot-agent]

    steps:
      - name: Check codex CLI
        id: codex
        run: codex --version
        continue-on-error: true

      - name: Check claude CLI
        id: claude
        run: claude --version
        continue-on-error: true

      - name: Check opencode CLI
        id: opencode
        run: opencode --version
        continue-on-error: true

      - name: Check python3
        id: python3
        run: python3 --version
        continue-on-error: true

      - name: Check git
        id: git
        run: git --version
        continue-on-error: true

      - name: Report and fail if any agent is unavailable
        run: |
          echo "=== Agent Runner Health ==="
          printf '  %-12s %s\n' "codex:"    "${{ steps.codex.outcome }}"
          printf '  %-12s %s\n' "claude:"   "${{ steps.claude.outcome }}"
          printf '  %-12s %s\n' "opencode:" "${{ steps.opencode.outcome }}"
          printf '  %-12s %s\n' "python3:"  "${{ steps.python3.outcome }}"
          printf '  %-12s %s\n' "git:"      "${{ steps.git.outcome }}"

          FAIL=0
          [[ "${{ steps.codex.outcome }}"    != "success" ]] && { echo "::error::codex CLI unavailable";    FAIL=1; }
          [[ "${{ steps.claude.outcome }}"   != "success" ]] && { echo "::error::claude CLI unavailable";   FAIL=1; }
          [[ "${{ steps.opencode.outcome }}" != "success" ]] && { echo "::error::opencode CLI unavailable"; FAIL=1; }
          [[ "${{ steps.python3.outcome }}"  != "success" ]] && { echo "::error::python3 unavailable";      FAIL=1; }
          [[ "${{ steps.git.outcome }}"      != "success" ]] && { echo "::error::git unavailable";          FAIL=1; }

          if [[ $FAIL -eq 0 ]]; then
            echo "All agents healthy."
          else
            exit 1
          fi
