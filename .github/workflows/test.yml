name: Pull request checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      issues: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests (including GitHub API integration)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: cargo test --all

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: main
            context: .
            file: Dockerfile
          - name: sandbox
            context: ./crates/sandbox/docker
            file: crates/sandbox/docker/Dockerfile
          - name: deployment-bot
            context: .
            file: Dockerfile.deployment-bot
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (musl)
        if: matrix.name == 'main'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        if: matrix.name == 'main'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo artifacts
        if: matrix.name == 'main'
        uses: Swatinem/rust-cache@v2
        with:
          key: musl-release

      - name: Build bot binary (musl)
        if: matrix.name == 'main'
        env:
          HOUSEBOT_GIT_SHA: ${{ github.event.pull_request.head.sha }}
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: |
          cargo build --release --locked --target x86_64-unknown-linux-musl --package housebot
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/housebot dist/housebot
          strip dist/housebot

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build Docker image (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          cache-from: type=gha,scope=pr-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=pr-${{ matrix.name }}

  sandbox-docker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: sandbox-integ

      - name: Build sandbox Docker image
        run: |
          docker build -t ghcr.io/bushshrub/housebot/sandbox:latest \
            crates/sandbox/docker

      - name: Run sandbox Docker integration tests
        # gVisor (runsc) is not available on GitHub-hosted runners.
        # HOUSEBOT_SANDBOX_RUNTIME=runc exercises the full lifecycle with the
        # standard OCI runtime.  The gVisor runtime flag is verified by unit tests.
        env:
          HOUSEBOT_SANDBOX_RUNTIME: runc
        run: |
          cargo test --package housebot-sandbox \
            -- --include-ignored --test-threads=1
