name: Test

on:
  workflow_call:
  push:
  pull_request:

jobs:
  test:
    name: Unit tests (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # Pin to 3.12 to match the production Docker image (python:3.12-slim).
          # The repo's .python-version tracks 3.14 for local dev, but 3.14 is still
          # RC and breaks pydantic/openai type-hint evaluation at import time.
          python-version: "3.12"

      - name: Run tests
        run: uv run --with pytest --with pytest-asyncio --with pytest-cov python -m pytest -v --tb=short --cov=src --cov-report=term-missing

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Lint (ruff check)
        run: uv run --with ruff ruff check .

      - name: Format check (ruff format)
        run: uv run --with ruff ruff format --check .

  shellcheck:
    name: Shell script lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          find scripts/ sandbox/ -name '*.sh' -print0 \
            | xargs -0 shellcheck --severity=warning --shell=bash
