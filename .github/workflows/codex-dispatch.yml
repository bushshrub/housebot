name: codex-dispatch

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to work on
        required: true
        type: number
      prompt:
        description: Prompt for Codex
        required: true
        type: string

concurrency:
  group: codex-dispatch-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  codex:
    runs-on: [self-hosted, housebot-agent]
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Verify dispatch source
        if: ${{ !endsWith(github.actor, '[bot]') }}
        run: |
          echo "::error::This workflow can only be triggered by the authorized Housebot GitHub App."
          exit 1
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Configure git identity
        run: |
          git config user.name "housebot-codex"
          git config user.email "noreply@housebot.app"
      - name: Create feature branch
        id: branch
        run: |
          BRANCH="codex/issue-${{ inputs.issue_number }}-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
      - name: Run Codex
        run: codex --approval-mode full-auto "${{ inputs.prompt }}"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: Commit and push changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "feat: implement changes for issue #${{ inputs.issue_number }}"
          git push -u origin "${{ steps.branch.outputs.name }}"
      - name: Open pull request
        run: |
          gh pr create --title "Codex: resolve issue #${{ inputs.issue_number }}" \
            --body "Closes #${{ inputs.issue_number }}" \
            --head "${{ steps.branch.outputs.name }}" --base master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
