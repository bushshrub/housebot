name: Deployment bot publish

on:
  push:
    branches: [main, master]
    paths:
      - crates/deployment-bot/**
      - Dockerfile.deployment-bot
      - .github/workflows/deployment-bot-publish.yml
  workflow_dispatch:

concurrency:
  group: deployment-bot-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            architecture: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            architecture: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: Dockerfile.deployment-bot
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository }}/deployment-bot:sha-${{ github.sha }}-${{ matrix.architecture }}
          cache-from: type=gha,scope=deployment-bot-${{ matrix.architecture }}
          cache-to: type=gha,mode=max,scope=deployment-bot-${{ matrix.architecture }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Publish multi-platform manifest
        env:
          IMAGE: ghcr.io/${{ github.repository }}/deployment-bot
          SHA: ${{ github.sha }}
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:latest" \
            --tag "$IMAGE:sha-$SHA" \
            "$IMAGE:sha-$SHA-amd64" \
            "$IMAGE:sha-$SHA-arm64"
