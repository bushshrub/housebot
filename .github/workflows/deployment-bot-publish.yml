name: Deployment bot publish

on:
  push:
    branches: [main, master]
    paths:
      - crates/deployment-bot/**
      - crates/config/**
      - crates/database/**
      - Cargo.toml
      - Cargo.lock
      - Dockerfile.deployment-bot
      - .github/workflows/deployment-bot-publish.yml
  workflow_dispatch:

concurrency:
  group: deployment-bot-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            architecture: amd64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (musl)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: musl-release-deployment-bot

      - name: Build Rust binary (musl)
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: |
          cargo build --release --locked \
            --target x86_64-unknown-linux-musl \
            --package deployment-bot --bin deployment-bot
          mkdir -p dist
          cp "target/x86_64-unknown-linux-musl/release/deployment-bot" "dist/deployment-bot"
          strip "dist/deployment-bot"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: Dockerfile.deployment-bot
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/deployment-bot:sha-${{ github.sha }}-${{ matrix.architecture }}
            ghcr.io/${{ github.repository }}/deployment-bot:latest
          cache-from: type=gha,scope=deployment-bot-${{ matrix.architecture }}
          cache-to: type=gha,mode=max,scope=deployment-bot-${{ matrix.architecture }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Publish multi-platform manifest
        env:
          IMAGE: ghcr.io/${{ github.repository }}/deployment-bot
          SHA: ${{ github.sha }}
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:latest" \
            --tag "$IMAGE:sha-$SHA" \
            "$IMAGE:sha-$SHA-amd64"
