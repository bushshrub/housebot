name: claude-dispatch

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to work on
        required: true
        type: number
      prompt:
        description: Prompt for Claude Code
        required: true
        type: string
      requester_id:
        description: Discord user ID to notify when the run finishes
        required: true
        type: string

concurrency:
  group: claude-dispatch-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Verify dispatch source
        if: ${{ !endsWith(github.actor, '[bot]') }}
        run: |
          echo "::error::This workflow can only be triggered by the authorized Housebot GitHub App."
          exit 1
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run Claude Code
        id: run_agent
        uses: anthropics/claude-code-action@beta
        with:
          direct_prompt: ${{ inputs.prompt }}
          issue_number: ${{ inputs.issue_number }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Notify Discord of completion
        if: always() && steps.run_agent.outcome != 'skipped'
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOYMENT_WEBHOOK }}
          OUTCOME: ${{ steps.run_agent.outcome }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REQUESTER_ID: ${{ inputs.requester_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_DEPLOYMENT_WEBHOOK is not configured; skipping notification."
            exit 0
          fi

          if [ "$OUTCOME" = "success" ]; then
            STATUS_LINE="✅ Claude Code finished issue #${ISSUE_NUMBER}."
          else
            STATUS_LINE="❌ Claude Code run for issue #${ISSUE_NUMBER} did not complete successfully (${OUTCOME})."
          fi
          # Machine-readable footer the bot parses to know who to DM; kept out
          # of the visible description since it's not meant to be read.
          FOOTER="housebot-dev-notify requester_id=${REQUESTER_ID} issue=${ISSUE_NUMBER} status=${OUTCOME}"

          jq -n \
            --arg status "$STATUS_LINE" \
            --arg url "$RUN_URL" \
            --arg footer "$FOOTER" \
            '{
              embeds: [{
                title: "Feature development finished",
                url: $url,
                description: $status,
                color: 5814783,
                footer: {text: $footer}
              }]
            }' \
            | curl --fail --silent --show-error -X POST "$WEBHOOK" \
                -H "Content-Type: application/json" \
                --data-binary @-
