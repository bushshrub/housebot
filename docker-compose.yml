name: house-chatbot

services:
  deployment-bot:
    image: ghcr.io/bushshrub/housebot/deployment-bot:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.env:/app/.env:ro
    environment:
      - DOCKER_NETWORK=house-chatbot_default
