name: house-chatbot

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: housebot
      POSTGRES_USER: housebot
      POSTGRES_PASSWORD: housebot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U housebot -d housebot"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  deployment-bot:
    image: ghcr.io/bushshrub/housebot/deployment-bot:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.env:/app/.env:ro
    environment:
      - DOCKER_NETWORK=house-chatbot_default

volumes:
  postgres-data:
