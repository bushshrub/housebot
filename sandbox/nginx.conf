server {
    listen 3000;
    root /workspace;

    location / {
        autoindex on;
        autoindex_localtime on;
        autoindex_exact_size off;
        # Serve HTML files directly; fall back to directory listing
        try_files $uri $uri/ =404;
    }

    # Prevent access to dotfiles and opencode.json (internal config)
    location ~ /\. { deny all; }
    location = /opencode.json { deny all; }
}
